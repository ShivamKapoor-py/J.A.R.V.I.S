<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>J.A.R.V.I.S Voice Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;500;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="jarvis-assistant.css">
</head>
<body>
    <div class="assistant-container">
        <!-- Background Elements -->
        <div class="bg-grid"></div>
        <div class="bg-particles"></div>
        <div class="bg-circles"></div>
        
        <!-- Main Assistant Interface -->
        <div class="assistant-interface">
            <!-- Header with Logo -->
            <div class="assistant-header">
                <div class="logo-container">
                    <div class="logo-ring"></div>
                    <div class="logo-ring"></div>
                    <div class="logo-ring"></div>
                    <div class="logo-core"></div>
                </div>
                <h1 class="assistant-title">
                    <span class="text-gradient">J.A.R.V.I.S</span>
                </h1>
            </div>
            
            <!-- Welcome Message with Animation -->
            <div class="welcome-message">
                <div class="text-scramble">WELCOME TO</div>
                <div class="text-glitch" data-text="J.A.R.V.I.S">J.A.R.V.I.S</div>
                <div class="text-subtitle">Just A Rather Very Intelligent System</div>
            </div>
            
            <!-- Visualization Area -->
            <div class="visualization-container">
                <div class="visualization-ring"></div>
                <div class="visualization-ring"></div>
                <div class="visualization-ring"></div>
                <div class="visualization-core">
                    <div class="core-inner"></div>
                </div>
                <div class="visualization-waves">
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                    <div class="wave"></div>
                </div>
                <div class="visualization-spectrum">
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                    <div class="bar"></div>
                </div>
            </div>
            
            <!-- Status Display -->
            <div class="status-container">
                <div class="status-indicator">
                    <div class="status-dot"></div>
                    <div class="status-text">STANDBY</div>
                </div>
                <div class="status-details">Say "Hey Jarvis" to activate</div>
            </div>
            
            <!-- Transcript Area -->
            <div class="transcript-container">
                <div class="transcript-header">
                    <span class="transcript-title">TRANSCRIPT</span>
                    <span class="transcript-time" id="current-time">00:00:00</span>
                </div>
                <div class="transcript-content" id="transcript">
                    <div class="transcript-line system">
                        <span class="line-prefix">SYSTEM:</span>
                        <span class="line-text">J.A.R.V.I.S online and ready.</span>
                    </div>
                </div>
            </div>
            
            <!-- Control Panel -->
            <div class="control-panel">
                <button class="control-btn mic-btn" id="mic-toggle">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                        <line x1="12" y1="19" x2="12" y2="23"></line>
                        <line x1="8" y1="23" x2="16" y2="23"></line>
                    </svg>
                    <span class="btn-text">ACTIVATE</span>
                </button>
                <button class="control-btn settings-btn">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                    <span class="btn-text">SETTINGS</span>
                </button>
                <button class="control-btn clear-btn" id="clear-transcript">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="3 6 5 6 21 6"></polyline>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
                    </svg>
                    <span class="btn-text">CLEAR</span>
                </button>
            </div>
        </div>
        
        <!-- Notification Area -->
        <div class="notification-area" id="notification">
            <div class="notification-content">
                <div class="notification-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <line x1="12" y1="8" x2="12" y2="12"></line>
                        <line x1="12" y1="16" x2="12.01" y2="16"></line>
                    </svg>
                </div>
                <div class="notification-message">Notification message here</div>
            </div>
        </div>
        
        <!-- System Info Panel -->
        <div class="system-info">
            <div class="info-item">
                <span class="info-label">STATUS</span>
                <span class="info-value" id="system-status">ONLINE</span>
            </div>
            <div class="info-item">
                <span class="info-label">MEMORY</span>
                <span class="info-value">98.7%</span>
            </div>
            <div class="info-item">
                <span class="info-label">UPTIME</span>
                <span class="info-value" id="system-uptime">00:00:00</span>
            </div>
        </div>
    </div>

    <script src="jarvis-assistant.js"></script>
</body>
</html>
